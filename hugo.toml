baseURL = "https://xiaochendev.github.io/"
title = "x'Notes"
theme = "PaperMod"
paginate = 10
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[minify]
disableXML = true
minifyOutput = true

[params]
  env = "production"
  title = "x'Notes"
  description = "Learning notes and technical writings."
  author = "XiaoChen"
  defaultTheme = "auto"           # auto|dark|light
  disableThemeToggle = false

  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = false
  ShowCodeCopyButtons = true
  ShowWordCount = false
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  comments = false
  hidemeta = false
  hideSummary = false
  showtoc = false
  tocopen = false
  mainSections = ["posts"]
  ShowHomeContent = true

  [params.homeInfoParams]
    Title = "👋 Welcome to x'Notes"
    Content = "Hi, I'm XiaoChen. I take my learning notes and technical writings here."

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/xiaochendev"

  [[params.socialIcons]]
    name = "rss"
    url = "index.xml"

  [params.analytics.google]
    SiteVerificationTag = ""

  [params.cover]
    hidden = true
    hiddenInList = true
    hiddenInSingle = true

  [params.editPost]
    URL = ""
    Text = ""
    appendFilePath = false

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    limit = 10
    keys = ["title", "permalink", "summary", "content"]

# MathJax support
[params.math]
  enable = true

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "Posts"
    url = "/"
    weight = 1

  [[menu.main]]
    identifier = "archives"
    name = "Archive"
    url = "/archives/"
    weight = 2

  [[menu.main]]
    identifier = "search"
    name = "Search"
    url = "/search/"
    weight = 3

  [[menu.main]]
    identifier = "tags"
    name = "Tags"
    url = "/tags/"
    weight = 4

  [[menu.main]]
    identifier = "faq"
    name = "FAQ"
    url = "/faq/"
    weight = 5

[taxonomies]
  category = "categories"
  tag = "tags"

[outputs]
  home = ["HTML", "RSS", "JSON"]   # JSON required for search

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true               # allow raw HTML in markdown
  [markup.highlight]
    noClasses = false
    anchorLineNos = true
    codeFences = true
    guessSyntax = true
    lineNos = true
    style = "monokai"
